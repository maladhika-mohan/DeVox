name: saamai_app
description: Saamai - Voice-driven instrument conversion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  record: ^5.1.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.0
  permission_handler: ^11.3.0
  speech_to_text: ^6.6.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
